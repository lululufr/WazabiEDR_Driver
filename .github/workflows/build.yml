name: Build WazabiEDR Agent

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── Caches Cargo ─────────────────────────────────────────────────────────
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      # Cache des artefacts de build : évite de recompiler les dépendances
      # si Cargo.lock et les sources n'ont pas changé.
      - name: Cache target/
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**', 'build.rs') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-target-

      # ── Outils cargo ─────────────────────────────────────────────────────────
      # taiki-e/install-action télécharge des binaires pré-compilés (≈5s vs ≈5min pour cargo install)
      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install rust-script
        uses: taiki-e/install-action@v2
        with:
          tool: rust-script

      # ── LLVM (requis par wdk-sys/bindgen) ────────────────────────────────────
      - name: Install LLVM 17.0.6
        shell: pwsh
        run: |
          $clangPath = "C:\Program Files\LLVM\bin"
          if (Test-Path "$clangPath\clang.exe") {
            Write-Host "LLVM déjà installé : $clangPath"
          } else {
            winget install --id LLVM.LLVM --version 17.0.6 `
              --accept-package-agreements --accept-source-agreements `
              --silent --disable-interactivity
          }
          echo "LIBCLANG_PATH=$clangPath" >> $env:GITHUB_ENV
          echo "$clangPath"              >> $env:GITHUB_PATH

      # ── WDK via NuGet ────────────────────────────────────────────────────────
      # Approche de microsoft/windows-drivers-rs : NuGet extrait les packages dans
      # C:\packages\ et wdk-build lit WDKContentRoot/WDKBinRoot/WDKToolRoot directement,
      # sans passer par le registre Windows — élimine le conflit de version avec le SDK
      # pré-installé sur le runner (10.0.26100.0).
      - name: Install WDK 10.0.26100 via NuGet
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ProgressPreference = 'SilentlyContinue'

          $baseVersion  = "10.0.26100"
          $packagesRoot = "C:\packages"
          $nugetApiUrl  = "https://api.nuget.org/v3-flatcontainer/microsoft.windows.wdk.x64/index.json"

          # Résolution de la dernière QFE disponible pour 10.0.26100
          Write-Host "Recherche de la dernière QFE pour WDK $baseVersion..."
          $resp    = Invoke-RestMethod -Uri $nugetApiUrl -TimeoutSec 30
          $version = $resp.versions |
            Where-Object { $_ -match "^$([regex]::Escape($baseVersion))\.\d+$" } |
            Sort-Object { [System.Version]$_ } |
            Select-Object -Last 1

          if (-not $version) { throw "Aucune version WDK $baseVersion trouvée sur NuGet" }
          Write-Host "Version résolue : $version"

          # Installation des packages NuGet WDK
          foreach ($pkg in @("Microsoft.Windows.WDK.x64", "Microsoft.Windows.WDK.ARM64")) {
            Write-Host "Installation $pkg $version..."
            nuget install $pkg -Version $version -OutputDirectory $packagesRoot -NonInteractive
            if ($LASTEXITCODE -ne 0) { throw "Échec installation $pkg" }
          }

          # Découverte des chemins installés
          $pkgDirs   = Get-ChildItem $packagesRoot -Directory |
            Where-Object { $_.Name -like "*.$baseVersion.*" }

          $sdkPkg    = $pkgDirs |
            Where-Object { $_.Name -match "^Microsoft\.Windows\.SDK\.CPP\.$baseVersion(\.\d+)?$" } |
            Select-Object -First 1
          $wdkX64Pkg = $pkgDirs |
            Where-Object { $_.Name -match "^Microsoft\.Windows\.WDK\.x64\.$baseVersion" } |
            Select-Object -First 1

          if (-not $sdkPkg)    { throw "Package SDK introuvable dans $packagesRoot" }
          if (-not $wdkX64Pkg) { throw "Package WDK x64 introuvable dans $packagesRoot" }

          Write-Host "SDK : $($sdkPkg.FullName)"
          Write-Host "WDK : $($wdkX64Pkg.FullName)"

          # Variables d'environnement lues par wdk-build (prioritaires sur le registre)
          $envVars = @{
            Version_Number    = "$baseVersion.0"
            FullVersionNumber = $version
            WDKContentRoot    = "$($wdkX64Pkg.FullName)\c\"
            WDKBinRoot        = "$($wdkX64Pkg.FullName)\c\bin\$baseVersion.0"
            WDKToolRoot       = "$($wdkX64Pkg.FullName)\c\tools\$baseVersion.0"
            WindowsSdkBinPath = "$($sdkPkg.FullName)\c\bin"
            NugetPackagesRoot = $packagesRoot
          }

          foreach ($kv in $envVars.GetEnumerator()) {
            Write-Host "  $($kv.Key) = $($kv.Value)"
            echo "$($kv.Key)=$($kv.Value)" >> $env:GITHUB_ENV
          }

          $wdkBinX64 = "$($wdkX64Pkg.FullName)\c\bin\$baseVersion.0\x64"
          echo "$wdkBinX64" >> $env:GITHUB_PATH
          Write-Host "WDK bin ajouté au PATH : $wdkBinX64"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build driver package
        run: cargo make

      # ── Packaging & Upload ────────────────────────────────────────────────────
      - name: Package artifacts
        shell: pwsh
        run: |
          $pkg = "target\debug\WazabiEDR_Agent_package"
          Compress-Archive -Path "$pkg\*" -DestinationPath "WazabiEDR_Agent.zip" -Force
          Write-Host "Contenu du package :"
          Get-ChildItem $pkg | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WazabiEDR_Agent-${{ github.sha }}
          path: WazabiEDR_Agent.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: WazabiEDR_Agent.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
