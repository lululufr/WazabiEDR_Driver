name: Build WazabiEDR Driver

on:
  pull_request:
    branches: [main]
  # Versioned tag pushes feed the WazabiEDR_Installer build: it
  # downloads the matching vX.Y.Z asset and bundles the driver
  # package into setup.exe. Without this trigger the
  # "Create or update versioned release" step below would never fire.
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: v2-${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: v2-${{ runner.os }}-cargo-registry-

      - name: Cache target/
        uses: actions/cache@v4
        with:
          path: target/
          key: v2-${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**', 'build.rs') }}
          restore-keys: |
            v2-${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-
            v2-${{ runner.os }}-target-

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install rust-script
        uses: taiki-e/install-action@v2
        with:
          tool: rust-script

      # ── LLVM ─────────────────────────────────────────────────────────────────
      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:\Program Files\LLVM
          key: llvm-17.0.6

      - name: Install LLVM 17.0.6
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $clangPath = "C:\Program Files\LLVM\bin"
          if (Test-Path "$clangPath\clang.exe") {
            Write-Host "LLVM déjà présent : $clangPath"
          } else {
            winget install --id LLVM.LLVM --version 17.0.6 `
              --accept-package-agreements --accept-source-agreements `
              --silent --disable-interactivity
          }

      - name: Configure LLVM env vars
        shell: pwsh
        run: |
          $clangPath = "C:\Program Files\LLVM\bin"
          echo "LIBCLANG_PATH=$clangPath" >> $env:GITHUB_ENV
          echo "$clangPath"              >> $env:GITHUB_PATH

      # ── WDK ──────────────────────────────────────────────────────────────────
      - name: Cache WDK NuGet packages
        id: cache-wdk
        uses: actions/cache@v4
        with:
          path: C:\packages
          key: wdk-10.0.26100

      - name: Install WDK 10.0.26100 via NuGet
        if: steps.cache-wdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ProgressPreference = 'SilentlyContinue'

          $baseVersion  = "10.0.26100"
          $packagesRoot = "C:\packages"
          $nugetApiUrl  = "https://api.nuget.org/v3-flatcontainer/microsoft.windows.wdk.x64/index.json"

          Write-Host "Recherche de la dernière QFE pour WDK $baseVersion..."
          $resp    = Invoke-RestMethod -Uri $nugetApiUrl -TimeoutSec 30
          $version = $resp.versions |
            Where-Object { $_ -match "^$([regex]::Escape($baseVersion))\.\d+$" } |
            Sort-Object { [System.Version]$_ } |
            Select-Object -Last 1

          if (-not $version) { throw "Aucune version WDK $baseVersion trouvée sur NuGet" }
          Write-Host "Version résolue : $version"

          foreach ($pkg in @("Microsoft.Windows.WDK.x64", "Microsoft.Windows.WDK.ARM64")) {
            Write-Host "Installation $pkg $version..."
            nuget install $pkg -Version $version -OutputDirectory $packagesRoot -NonInteractive
            if ($LASTEXITCODE -ne 0) { throw "Échec installation $pkg" }
          }

      - name: Configure WDK env vars
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $baseVersion  = "10.0.26100"
          $packagesRoot = "C:\packages"

          $pkgDirs   = Get-ChildItem $packagesRoot -Directory |
            Where-Object { $_.Name -like "*.$baseVersion.*" }

          $sdkPkg    = $pkgDirs |
            Where-Object { $_.Name -match "^Microsoft\.Windows\.SDK\.CPP\.$baseVersion(\.\d+)?$" } |
            Select-Object -First 1
          $wdkX64Pkg = $pkgDirs |
            Where-Object { $_.Name -match "^Microsoft\.Windows\.WDK\.x64\.$baseVersion" } |
            Select-Object -First 1

          if (-not $sdkPkg)    { throw "Package SDK introuvable dans $packagesRoot" }
          if (-not $wdkX64Pkg) { throw "Package WDK x64 introuvable dans $packagesRoot" }

          $version = $wdkX64Pkg.Name -replace "^Microsoft\.Windows\.WDK\.x64\.", ""

          Write-Host "SDK : $($sdkPkg.FullName)"
          Write-Host "WDK : $($wdkX64Pkg.FullName)"
          Write-Host "Version : $version"

          $envVars = @{
            Version_Number    = "$baseVersion.0"
            FullVersionNumber = $version
            WDKContentRoot    = "$($wdkX64Pkg.FullName)\c\"
            WDKBinRoot        = "$($wdkX64Pkg.FullName)\c\bin\$baseVersion.0"
            WDKToolRoot       = "$($wdkX64Pkg.FullName)\c\tools\$baseVersion.0"
            WindowsSdkBinPath = "$($sdkPkg.FullName)\c\bin"
            NugetPackagesRoot = $packagesRoot
          }

          foreach ($kv in $envVars.GetEnumerator()) {
            Write-Host "  $($kv.Key) = $($kv.Value)"
            echo "$($kv.Key)=$($kv.Value)" >> $env:GITHUB_ENV
          }

          $wdkBinX64 = "$($wdkX64Pkg.FullName)\c\bin\$baseVersion.0\x64"
          echo "$wdkBinX64" >> $env:GITHUB_PATH
          Write-Host "WDK bin ajouté au PATH : $wdkBinX64"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build driver package
        run: cargo make

      # ── Packaging & Upload ────────────────────────────────────────────────────
      - name: Package artifacts
        shell: pwsh
        run: |
          $pkg = "target\debug\WazabiEDR_Driver_package"
          Compress-Archive -Path "$pkg\*" -DestinationPath "WazabiEDR_Driver.zip" -Force
          Write-Host "Contenu du package :"
          Get-ChildItem $pkg | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WazabiEDR_Driver-${{ github.sha }}
          path: WazabiEDR_Driver.zip
          retention-days: 30


      - name: Force-update "latest" tag
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Update rolling "latest" release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build (master)"
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          makeLatest: false
          artifacts: WazabiEDR_Driver.zip
          body: |
            Build automatique depuis `master`.
            **Commit :** `${{ github.sha }}`
            **Date :** ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Create or update versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          removeArtifacts: true
          generateReleaseNotes: true
          makeLatest: true
          artifacts: WazabiEDR_Driver.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
