name: Build WazabiEDR Agent

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo tools (cargo-make, rust-script)
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-tools-v1

      - name: Install cargo-make and rust-script
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install cargo-make rust-script --locked

      - name: Install LLVM (requis par wdk-sys/bindgen)
        run: choco install llvm -y --no-progress

      - name: Install WDK matching the pre-installed Windows SDK
        shell: pwsh
        run: |
          # Le runner windows-latest embarque un SDK Windows (ex: 10.0.26100.0).
          # wdk-sys/bindgen cherche les headers kernel (km/) pour cette version exacte.
          # On installe le WDK correspondant via le téléchargement officiel Microsoft.

          $kitsRoot = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots").KitsRoot10
          $sdkVersion = Get-ChildItem "$kitsRoot\Include" -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty Name

          Write-Host "SDK détecté : $sdkVersion"

          $kmPath = "${kitsRoot}Include\$sdkVersion\km"
          if (Test-Path $kmPath) {
            Write-Host "Headers WDK déjà présents : $kmPath"
            exit 0
          }

          Write-Host "Téléchargement du WDK $sdkVersion ..."
          # URL officielle Microsoft — WDK Windows 11 24H2 (10.0.26100)
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2249371"
          $installer = "$env:TEMP\wdksetup.exe"
          Invoke-WebRequest -Uri $wdkUrl -OutFile $installer -UseBasicParsing

          Write-Host "Installation silencieuse du WDK ..."
          Start-Process -Wait -FilePath $installer `
            -ArgumentList "/quiet /norestart /features OptionId.WindowsDriverKitComplete"

          if (-not (Test-Path $kmPath)) {
            Write-Error "WDK installé mais km/ introuvable : $kmPath"
            exit 1
          }
          Write-Host "WDK $sdkVersion installé avec succès"

      - name: Set LLVM and WDK paths
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"

          # Détection dynamique de la version WDK/SDK installée
          $wdkBinRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $wdkVersion = Get-ChildItem $wdkBinRoot -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          $wdkBin = Join-Path $wdkVersion.FullName "x64"

          Write-Host "LLVM  : $llvmBin"
          Write-Host "WDK   : $wdkBin"

          echo "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          echo "$llvmBin"               >> $env:GITHUB_PATH
          echo "$wdkBin"               >> $env:GITHUB_PATH

      - name: Build driver package
        run: cargo make

      - name: Package artifacts
        shell: pwsh
        run: |
          $pkg = "target\debug\WazabiEDR_Agent_package"
          Compress-Archive -Path "$pkg\*" -DestinationPath "WazabiEDR_Agent.zip" -Force
          Write-Host "Contenu du package :"
          Get-ChildItem $pkg | Format-Table Name, Length

      - name: Upload artifact (tous les commits)
        uses: actions/upload-artifact@v4
        with:
          name: WazabiEDR_Agent-${{ github.sha }}
          path: WazabiEDR_Agent.zip
          retention-days: 30

      - name: Create GitHub Release (tags uniquement)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: WazabiEDR_Agent.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
